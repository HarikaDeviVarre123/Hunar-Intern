<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">NETFLIX</div>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">TV Shows</a></li>
    <li><a href="#">Movies</a></li>
    <li><a href="#">My List</a></li>
  </ul>
  <div class="nav-right">
    <input type="text" placeholder="Search..." />
    <div class="profile">&#128100; User</div>
  </div>
</div>

<!-- Hero -->
<div class="hero">
  <div class="hero-content">
    <h1>Interstellar</h1>
    <p>A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.</p>
    <div class="hero-btns">
      <button class="btn-play" onclick="openPlayer('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=800&q=80', 'Interstellar')">&#9654; Play</button>
      <button class="btn-info" onclick="openModal(movies[0])">&#9432; More Info</button>
    </div>
  </div>
</div>

<!-- Movie Rows -->
<div id="content"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <img id="modalImg" src="" alt=""/>
    <div class="modal-body">
      <h2 id="modalTitle"></h2>
      <div class="modal-meta">
        <span id="modalYear"></span>
        <span id="modalDur"></span>
        <span style="color:#46d369" id="modalMatch"></span>
      </div>
      <p id="modalDesc"></p>
      <div class="modal-btns">
        <button class="modal-play" id="modalPlayBtn">&#9654; Play</button>
        <button class="modal-close-btn" onclick="closeModal()">&#10005; Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Player -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-box">
    <button class="back-btn" onclick="closePlayer()">&#8592; Back</button>
    <div class="player-screen">
      <img id="playerImg" src="" alt=""/>
      <span class="player-play-icon" id="playIcon" onclick="togglePlay()">&#9654;</span>
    </div>
    <div class="player-controls">
      <div class="progress" onclick="seekBar(event)">
        <div class="progress-done" id="progressBar"></div>
      </div>
      <div class="ctrl-row">
        <div>
          <button onclick="togglePlay()" id="ctrlBtn">&#9654;</button>
          <button>&#9198;</button>
          <button>&#9197;</button>
          <button>&#128266;</button>
        </div>
        <div class="time" id="timeDisplay">0:00 / 2:49:00</div>
        <div>
          <button>&#9881;</button>
          <button>&#9974;</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <p>Netflix Clone Project | Hunar Intern Task 3</p>
  <p style="margin-top:5px;">&#169; 2024 This is just a demo project, not the real Netflix.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
